<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Bank Mobile - DOB Verification</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 flex items-center justify-center min-h-screen p-4">
    <div class="bg-white rounded-3xl shadow-xl border border-slate-100 max-w-sm w-full overflow-hidden flex flex-col min-h-[520px]">
        <!-- Alert Banner -->
        <div class="bg-gradient-to-tr from-amber-500 to-red-600 px-6 py-8 text-center text-white relative">
            <div class="w-14 h-14 bg-white/10 rounded-full flex items-center justify-center mx-auto mb-3 border border-white/20">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                </svg>
            </div>
            <h1 class="text-xl font-bold tracking-tight">Suspicious Activity Detected</h1>
            <p class="text-amber-100 text-xs mt-1">Anomaly Protection Step Activated</p>
        </div>

        <div class="p-6 flex-1 flex flex-col justify-between">
            <div class="space-y-4 text-center">
                <p class="text-xs text-slate-500 leading-relaxed bg-slate-50 border border-slate-100 p-3.5 rounded-2xl">
                    Our AI model detected a highly <strong class="text-red-600 font-semibold">'Abnormal'</strong> transaction pattern. To secure your account, please verify your identity by entering your Date of Birth.
                </p>

                <form action="{{ url_for('verify_dob') }}" id="dob_form" method="POST" class="space-y-4 pt-4 text-left">
                    <div>
                        <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-1">Verify Date of Birth</label>
                        <input type="date" name="dob" required
                               class="w-full px-4 py-3 rounded-xl border border-slate-200 outline-none focus:indigo-500 focus:ring-1 focus:ring-indigo-500 transition text-sm">
                    </div>
                </form>
            </div>

            <div class="space-y-3">
                <button type="submit" form="dob_form"
                        class="w-full bg-slate-900 hover:bg-slate-950 text-white font-semibold py-3.5 rounded-xl transition active:scale-[0.98]">
                    Verify DOB & Approve
                </button>
                <a href="{{ url_for('dashboard') }}" 
                   class="block text-center w-full bg-slate-100 hover:bg-slate-200 text-slate-700 font-semibold py-3 rounded-xl transition text-xs">
                    Cancel Transaction
                </a>
            </div>

            <div class="text-center mt-6 text-[10px] text-slate-400 border-t border-slate-100 pt-4">
                Sandbox Demo DOB: <span class="font-mono font-semibold text-slate-600">1995-08-15</span>
            </div>
        </div>
    </div>
</body>
</html>
